<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Focus"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <title>Focus Timer</title>

  <!-- Inline manifest via JS blob — no separate file needed -->
  <script>
    const manifest = {
      name: "Focus Timer",
      short_name: "Focus",
      start_url: ".",
      display: "standalone",
      background_color: "#0a0a0a",
      theme_color: "#0a0a0a",
      orientation: "portrait",
      icons: [
        { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='120' fill='%230a0a0a'/%3E%3Ccircle cx='256' cy='256' r='180' fill='none' stroke='%2330d158' stroke-width='28'/%3E%3Ctext x='256' y='310' text-anchor='middle' font-family='monospace' font-size='160' fill='%2330d158'%3E%E2%96%B6%3C/text%3E%3C/svg%3E", sizes: "512x512", type: "image/svg+xml" }
      ]
    };
    const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
    const link = document.createElement('link');
    link.rel = 'manifest'; link.href = URL.createObjectURL(blob);
    document.head.appendChild(link);
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --green: #30d158;
      --orange: #ff9f0a;
      --red: #ff453a;
      --bg: #0a0a0a;
      --surface: #141416;
      --surface2: #1c1c1e;
      --border: #2c2c2e;
      --text: #f2f2f7;
      --muted: #636366;
      --dimmed: #3a3a3c;
      --safe-top: env(safe-area-inset-top, 44px);
      --safe-bottom: env(safe-area-inset-bottom, 20px);
    }

    html, body {
      height: 100%; width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: calc(var(--safe-top) + 12px) 24px calc(var(--safe-bottom) + 16px);
      min-height: 100vh;
      min-height: -webkit-fill-available;
    }

    /* TOP BAR */
    .top-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .app-name {
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }
    .session-label {
      font-size: 12px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      transition: color 0.3s;
    }
    .session-label.active { color: var(--green); }

    /* RING SECTION */
    .ring-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      flex: 1;
      justify-content: center;
    }

    .ring-wrap {
      position: relative;
      width: min(72vw, 300px);
      height: min(72vw, 300px);
    }
    .ring-wrap svg {
      width: 100%; height: 100%;
      transform: rotate(-90deg);
    }
    .ring-bg { fill: none; stroke: #1a1a1c; stroke-width: 5; }
    .ring-track { fill: none; stroke: var(--dimmed); stroke-width: 5; stroke-linecap: round; }
    .ring-fg {
      fill: none;
      stroke: var(--green);
      stroke-width: 5;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear, stroke 0.5s ease;
    }
    .ring-center {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      display: flex; flex-direction: column; align-items: center;
    }
    .time-display {
      font-family: 'DM Mono', monospace;
      font-size: clamp(44px, 12vw, 68px);
      font-weight: 300;
      color: var(--text);
      letter-spacing: -3px;
      line-height: 1;
      transition: color 0.4s;
    }
    .time-display.running { color: var(--green); }
    .time-display.warning { color: var(--orange); }
    .time-display.ended   { color: var(--red); }

    .progress-pct {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 0.04em;
    }

    .done-badge {
      margin-top: 16px;
      padding: 8px 20px;
      border-radius: 20px;
      background: rgba(255,69,58,0.12);
      border: 0.5px solid rgba(255,69,58,0.3);
      color: var(--red);
      font-size: 13px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.06em;
      animation: pulseOpacity 1.2s ease-in-out infinite;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .done-badge.show { opacity: 1; pointer-events: auto; }
    @keyframes pulseOpacity { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* PRESETS */
    .presets-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      font-weight: 500;
    }
    .presets {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      width: 100%;
      max-width: 340px;
    }
    .preset {
      background: var(--surface2);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 12px 8px;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      -webkit-touch-callout: none;
    }
    .preset:active { transform: scale(0.95); }
    .preset.active {
      background: rgba(48,209,88,0.1);
      border-color: var(--green);
    }
    .preset-mins {
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      display: block;
      line-height: 1;
    }
    .preset.active .preset-mins { color: var(--green); }
    .preset-unit {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 3px;
      display: block;
    }

    /* CONTROLS */
    .controls {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 4px;
    }
    .ctrl {
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      transition: transform 0.1s, background 0.2s;
      -webkit-touch-callout: none;
    }
    .ctrl:active { transform: scale(0.9); }

    .btn-main {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--green);
      color: #000;
      font-size: 26px;
    }
    .btn-main.paused { background: var(--orange); }
    .btn-main.disabled { background: var(--dimmed); color: var(--muted); cursor: not-allowed; }

    .btn-side {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--surface2);
      border: 0.5px solid var(--border);
      color: var(--muted);
      font-size: 20px;
    }

    /* BOTTOM HOME BAR */
    .home-bar {
      width: 120px; height: 4px;
      background: #2c2c2e;
      border-radius: 2px;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <span class="app-name">Focus</span>
    <span class="session-label" id="sessionLabel">— select duration</span>
  </div>

  <div class="ring-section">
    <div class="ring-wrap">
      <svg id="ringsvg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <circle class="ring-bg" cx="100" cy="100" r="88"/>
        <circle class="ring-track" cx="100" cy="100" r="88"
          stroke-dasharray="553" stroke-dashoffset="0"/>
        <circle class="ring-fg" id="ringFg" cx="100" cy="100" r="88"
          stroke-dasharray="553" stroke-dashoffset="553"/>
      </svg>
      <div class="ring-center">
        <div class="time-display" id="timeDisplay">00:00</div>
        <div class="progress-pct" id="pctDisplay">0%</div>
      </div>
    </div>

    <div class="done-badge" id="doneBadge">✓ session complete</div>
  </div>

  <div style="display:flex;flex-direction:column;align-items:center;width:100%;max-width:340px;gap:0;">
    <div class="presets-label">Choose duration</div>
    <div class="presets" id="presets">
      <button class="preset" data-mins="5">
        <span class="preset-mins">5</span>
        <span class="preset-unit">min</span>
      </button>
      <button class="preset" data-mins="10">
        <span class="preset-mins">10</span>
        <span class="preset-unit">min</span>
      </button>
      <button class="preset" data-mins="15">
        <span class="preset-mins">15</span>
        <span class="preset-unit">min</span>
      </button>
      <button class="preset" data-mins="30">
        <span class="preset-mins">30</span>
        <span class="preset-unit">min</span>
      </button>
      <button class="preset" data-mins="45">
        <span class="preset-mins">45</span>
        <span class="preset-unit">min</span>
      </button>
      <button class="preset" data-mins="60">
        <span class="preset-mins">60</span>
        <span class="preset-unit">min</span>
      </button>
    </div>

    <div class="controls" style="margin-top:24px;">
      <button class="ctrl btn-side" id="resetBtn" onclick="resetTimer()" title="Reset">↺</button>
      <button class="ctrl btn-main disabled" id="playBtn" onclick="toggleTimer()">▶</button>
      <button class="ctrl btn-side" id="lapBtn" onclick="addMinute()" title="+1 min">+1</button>
    </div>
  </div>

  <div class="home-bar"></div>

  <script>
    const CIRC = 2 * Math.PI * 88; // ~553

    let totalSecs = 0, remainSecs = 0;
    let interval = null, running = false;
    let audioCtx = null;

    // Elements
    const timeEl = document.getElementById('timeDisplay');
    const pctEl  = document.getElementById('pctDisplay');
    const ringEl = document.getElementById('ringFg');
    const playBtn = document.getElementById('playBtn');
    const doneEl  = document.getElementById('doneBadge');
    const sessionLbl = document.getElementById('sessionLabel');

    // Preset selection
    document.getElementById('presets').addEventListener('click', e => {
      const btn = e.target.closest('.preset');
      if (!btn || running) return;
      document.querySelectorAll('.preset').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const mins = parseInt(btn.dataset.mins);
      totalSecs = mins * 60;
      remainSecs = totalSecs;
      doneEl.classList.remove('show');
      updateDisplay();
      updateRing(1);
      setColor('idle');
      sessionLbl.textContent = mins + ' min session';
      sessionLbl.classList.remove('active');
      playBtn.classList.remove('disabled','paused');
      playBtn.textContent = '▶';
    });

    function toggleTimer() {
      if (!totalSecs || remainSecs === 0) return;
      initAudio();
      running = !running;
      if (running) {
        playBtn.textContent = '⏸';
        playBtn.classList.add('paused');
        playBtn.classList.remove('disabled');
        sessionLbl.classList.add('active');
        interval = setInterval(tick, 1000);
      } else {
        playBtn.textContent = '▶';
        playBtn.classList.remove('paused');
        sessionLbl.classList.remove('active');
        clearInterval(interval);
      }
    }

    function tick() {
      remainSecs = Math.max(0, remainSecs - 1);
      updateDisplay();
      const frac = totalSecs > 0 ? remainSecs / totalSecs : 0;
      updateRing(frac);
      const elapsed = ((1 - frac) * 100).toFixed(0);
      pctEl.textContent = elapsed + '% elapsed';

      if (frac <= 0.2 && frac > 0) setColor('warning');
      else if (frac > 0.2) setColor('running');

      if (remainSecs === 0) {
        clearInterval(interval);
        running = false;
        playBtn.textContent = '▶';
        playBtn.classList.remove('paused');
        sessionLbl.classList.remove('active');
        setColor('ended');
        doneEl.classList.add('show');
        pctEl.textContent = '100% elapsed';
        playBeeps();
        vibrate();
      }
    }

    function resetTimer() {
      clearInterval(interval);
      running = false;
      remainSecs = totalSecs;
      doneEl.classList.remove('show');
      updateDisplay();
      updateRing(totalSecs > 0 ? 1 : 0);
      setColor('idle');
      playBtn.textContent = '▶';
      playBtn.classList.remove('paused');
      sessionLbl.classList.remove('active');
      if (totalSecs) pctEl.textContent = '0% elapsed';
      else pctEl.textContent = '0%';
    }

    function addMinute() {
      if (!totalSecs) return;
      remainSecs = Math.min(remainSecs + 60, totalSecs + 600);
      totalSecs = Math.max(totalSecs, remainSecs);
      updateDisplay();
      updateRing(remainSecs / totalSecs);
      doneEl.classList.remove('show');
    }

    function updateDisplay() {
      const m = Math.floor(remainSecs / 60).toString().padStart(2, '0');
      const s = (remainSecs % 60).toString().padStart(2, '0');
      timeEl.textContent = m + ':' + s;
    }

    function updateRing(frac) {
      const offset = CIRC * (1 - frac);
      ringEl.style.strokeDashoffset = offset;
    }

    function setColor(state) {
      timeEl.className = 'time-display';
      if (state === 'running') {
        timeEl.classList.add('running');
        ringEl.style.stroke = '#30d158';
      } else if (state === 'warning') {
        timeEl.classList.add('warning');
        ringEl.style.stroke = '#ff9f0a';
      } else if (state === 'ended') {
        timeEl.classList.add('ended');
        ringEl.style.stroke = '#ff453a';
      } else {
        ringEl.style.stroke = '#30d158';
      }
    }

    // Audio beep using Web Audio API
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function beep(freq, duration, delay) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, audioCtx.currentTime + delay);
      gain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + delay + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + delay + duration);
      osc.start(audioCtx.currentTime + delay);
      osc.stop(audioCtx.currentTime + delay + duration + 0.05);
    }

    function playBeeps() {
      initAudio();
      // Three ascending beeps
      beep(660, 0.18, 0.0);
      beep(880, 0.18, 0.25);
      beep(1046, 0.5,  0.5);
    }

    function vibrate() {
      if (navigator.vibrate) {
        navigator.vibrate([200, 100, 200, 100, 400]);
      }
    }

    // Service Worker for offline/PWA
    if ('serviceWorker' in navigator) {
      const swCode = `
        const CACHE = 'focus-timer-v1';
        self.addEventListener('install', e => {
          self.skipWaiting();
        });
        self.addEventListener('activate', e => {
          e.waitUntil(self.clients.claim());
        });
        self.addEventListener('fetch', e => {
          e.respondWith(
            caches.open(CACHE).then(cache =>
              cache.match(e.request).then(res => res || fetch(e.request))
            )
          );
        });
      `;
      const swBlob = new Blob([swCode], { type: 'application/javascript' });
      const swUrl = URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swUrl).catch(() => {});
    }

    // Keep screen awake using Wake Lock API (where supported)
    let wakeLock = null;
    async function requestWakeLock() {
      if ('wakeLock' in navigator) {
        try {
          wakeLock = await navigator.wakeLock.request('screen');
        } catch {}
      }
    }
    requestWakeLock();
    document.addEventListener('visibilitychange', async () => {
      if (document.visibilityState === 'visible') requestWakeLock();
    });
  </script>
</body>
</html>
