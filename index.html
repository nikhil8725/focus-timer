<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Focus"/>
  <meta name="theme-color" content="#000000"/>
  <title>Focus Timer</title>

  <script>
    const manifest = {
      name:"Focus Timer",short_name:"Focus",start_url:".",display:"standalone",
      background_color:"#000000",theme_color:"#000000",orientation:"portrait",
      icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%23000'/%3E%3Ccircle cx='256' cy='256' r='200' fill='none' stroke='%23e8ff47' stroke-width='32'/%3E%3C/svg%3E",sizes:"512x512",type:"image/svg+xml"}]
    };
    const b=new Blob([JSON.stringify(manifest)],{type:'application/json'});
    const l=document.createElement('link');l.rel='manifest';l.href=URL.createObjectURL(b);
    document.head.appendChild(l);
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

    :root{
      --y:#e8ff47;
      --y-dim:rgba(232,255,71,0.1);
      --y-border:rgba(232,255,71,0.3);
      --red:#ff3b30;
      --orange:#ff9500;
      --bg:#000;
      --s1:#0d0d0d;
      --s2:#161616;
      --border:#222;
      --text:#fff;
      --muted:#4a4a4a;
      --safe-top:env(safe-area-inset-top,44px);
      --safe-bottom:env(safe-area-inset-bottom,20px);
    }

    html,body{height:100%;width:100%;background:var(--bg);color:var(--text);overflow:hidden;}

    .screen{
      position:fixed;inset:0;
      display:flex;flex-direction:column;align-items:center;
      padding:calc(var(--safe-top) + 8px) 24px calc(var(--safe-bottom) + 12px);
      transition:opacity 0.45s ease,transform 0.45s ease;
    }
    .screen.hidden{opacity:0;pointer-events:none;transform:scale(1.05);}

    /* ── SELECT SCREEN ── */
    #sel{justify-content:space-between;}

    .brand{
      font-family:'Bebas Neue',sans-serif;
      font-size:44px;letter-spacing:0.05em;line-height:1;
      color:var(--text);align-self:flex-start;
    }
    .brand em{color:var(--y);font-style:normal;}

    .sub-label{
      font-size:10px;color:var(--muted);
      letter-spacing:0.14em;text-transform:uppercase;
      font-family:'DM Sans',sans-serif;
      align-self:flex-start;margin-bottom:10px;margin-top:2px;
    }

    .grid{
      display:grid;grid-template-columns:repeat(3,1fr);
      gap:9px;width:100%;
    }
    .tile{
      background:var(--s1);
      border:1px solid var(--border);
      border-radius:20px;padding:16px 6px 12px;
      text-align:center;cursor:pointer;
      transition:background 0.12s,border-color 0.12s,transform 0.08s;
    }
    .tile:active{transform:scale(0.93);}
    .tile.active{background:var(--y-dim);border-color:var(--y);}
    .tile-n{
      font-family:'Bebas Neue',sans-serif;
      font-size:46px;line-height:1;color:var(--text);display:block;
    }
    .tile.active .tile-n{color:var(--y);}
    .tile-u{
      font-size:9px;color:var(--muted);text-transform:uppercase;
      letter-spacing:0.1em;font-family:'DM Sans',sans-serif;
      display:block;margin-top:2px;
    }

    .notice{
      font-size:11px;color:var(--muted);
      font-family:'DM Sans',sans-serif;
      text-align:center;line-height:1.7;
    }
    .notice strong{color:#666;font-weight:500;}

    .go-btn{
      width:100%;background:var(--y);border:none;
      border-radius:20px;padding:22px;
      font-family:'Bebas Neue',sans-serif;
      font-size:30px;letter-spacing:0.12em;
      color:#000;cursor:pointer;
      transition:transform 0.08s,opacity 0.2s;
      opacity:0.25;
    }
    .go-btn.ready{opacity:1;}
    .go-btn:active{transform:scale(0.97);}

    /* ── TIMER SCREEN ── */
    #tmr{background:#000;justify-content:space-between;}

    .t-top{
      width:100%;display:flex;
      justify-content:space-between;align-items:center;
    }
    .pill{
      display:flex;align-items:center;gap:6px;
      background:var(--y-dim);border:1px solid var(--y-border);
      border-radius:20px;padding:6px 14px;
      font-size:11px;color:var(--y);
      font-family:'DM Sans',sans-serif;font-weight:500;
      letter-spacing:0.08em;text-transform:uppercase;
    }
    .dot{width:6px;height:6px;border-radius:50%;background:var(--y);
      animation:blink 1.4s ease-in-out infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.15}}

    .x-btn{
      font-size:12px;color:var(--muted);
      font-family:'DM Sans',sans-serif;
      background:none;border:1px solid var(--border);
      border-radius:20px;padding:6px 16px;cursor:pointer;
    }
    .x-btn:active{background:#111;}

    .hero{
      flex:1;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      width:100%;position:relative;
    }

    .big{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(100px,30vw,148px);
      line-height:0.88;letter-spacing:0.01em;
      color:var(--text);text-align:center;
      transition:color 0.5s;
    }
    .big.warn{color:var(--orange);}
    .big.end{color:var(--red);animation:shk 0.35s ease;}
    @keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}

    .bar-wrap{
      width:100%;max-width:300px;height:3px;
      background:#1c1c1c;border-radius:2px;
      margin-top:22px;overflow:hidden;
    }
    .bar{
      height:100%;background:var(--y);border-radius:2px;
      transition:width 1s linear,background 0.5s;
    }
    .bar.warn{background:var(--orange);}
    .bar.end{background:var(--red);}

    .el-lbl{
      margin-top:10px;font-size:11px;color:var(--muted);
      font-family:'DM Mono',monospace;letter-spacing:0.06em;
    }

    .done-ov{
      position:absolute;inset:0;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      opacity:0;pointer-events:none;transition:opacity 0.4s;
      background:#000;
    }
    .done-ov.show{opacity:1;pointer-events:auto;}
    .done-ov-big{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(64px,18vw,100px);
      color:var(--y);letter-spacing:0.04em;
      line-height:0.92;text-align:center;
    }
    .done-ov-sub{
      font-size:12px;color:var(--muted);
      font-family:'DM Mono',monospace;
      letter-spacing:0.06em;margin-top:10px;
    }

    .t-ctrls{width:100%;display:flex;flex-direction:column;gap:10px;}
    .crow{display:flex;gap:10px;}
    .cb{
      flex:1;border:none;border-radius:16px;
      padding:20px 8px;font-family:'Bebas Neue',sans-serif;
      font-size:22px;letter-spacing:0.08em;
      cursor:pointer;transition:transform 0.08s,background 0.15s;
    }
    .cb:active{transform:scale(0.94);}
    .cb-pause{background:var(--y);color:#000;}
    .cb-pause.paused{background:#fff;color:#000;}
    .cb-sm{
      flex:0 0 70px;background:var(--s2);
      color:#555;border:1px solid var(--border);
      font-size:16px;
    }

    /* ── DONE SCREEN ── */
    #done{background:#000;justify-content:center;gap:20px;}
    .done-big-txt{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(76px,24vw,120px);
      color:var(--y);letter-spacing:0.04em;
      line-height:0.92;text-align:center;
    }
    .done-info{
      font-size:13px;color:var(--muted);
      font-family:'DM Mono',monospace;
      letter-spacing:0.05em;text-align:center;line-height:1.9;
    }
    .again{
      width:calc(100% - 0px);background:var(--y);border:none;
      border-radius:20px;padding:22px;
      font-family:'Bebas Neue',sans-serif;
      font-size:28px;letter-spacing:0.1em;
      color:#000;cursor:pointer;
    }
    .again:active{transform:scale(0.97);}
  </style>
</head>
<body>

<!-- SELECT -->
<div id="sel" class="screen">
  <div style="width:100%">
    <div class="brand">FO<em>CU</em>S</div>
    <div style="font-size:11px;color:#333;font-family:'DM Sans',sans-serif;margin-top:2px;letter-spacing:0.04em;">deep work timer</div>
  </div>

  <div style="width:100%;display:flex;flex-direction:column;">
    <div class="sub-label">Duration</div>
    <div class="grid" id="grid">
      <button class="tile" data-mins="5"><span class="tile-n">5</span><span class="tile-u">min</span></button>
      <button class="tile" data-mins="10"><span class="tile-n">10</span><span class="tile-u">min</span></button>
      <button class="tile" data-mins="15"><span class="tile-n">15</span><span class="tile-u">min</span></button>
      <button class="tile" data-mins="30"><span class="tile-n">30</span><span class="tile-u">min</span></button>
      <button class="tile" data-mins="45"><span class="tile-n">45</span><span class="tile-u">min</span></button>
      <button class="tile" data-mins="60"><span class="tile-n">60</span><span class="tile-u">min</span></button>
    </div>
  </div>

  <div style="width:100%;display:flex;flex-direction:column;gap:12px;">
    <div class="notice">
      <strong>Focus Mode</strong> activates on start —<br/>
      goes full-screen &amp; keeps your screen on.
    </div>
    <button class="go-btn" id="goBtn" onclick="startTimer()">START SESSION</button>
  </div>
</div>

<!-- TIMER -->
<div id="tmr" class="screen hidden">
  <div class="t-top">
    <div class="pill"><div class="dot"></div>Focus Mode</div>
    <button class="x-btn" onclick="exitToSel()">EXIT</button>
  </div>

  <div class="hero">
    <div class="big" id="bigTime">00:00</div>
    <div class="bar-wrap"><div class="bar" id="bar" style="width:100%"></div></div>
    <div class="el-lbl" id="elLbl">0% elapsed</div>

    <div class="done-ov" id="doneOv">
      <div class="done-ov-big">TIME'S<br/>UP</div>
      <div class="done-ov-sub" id="doneOvSub">session complete</div>
    </div>
  </div>

  <div class="t-ctrls">
    <div class="crow">
      <button class="cb cb-pause" id="pauseBtn" onclick="togglePause()">PAUSE</button>
      <button class="cb cb-sm" onclick="addMin()">+1m</button>
      <button class="cb cb-sm" onclick="resetRun()">↺</button>
    </div>
  </div>
</div>

<!-- DONE -->
<div id="done" class="screen hidden">
  <div class="done-big-txt">SESSION<br/>DONE</div>
  <div class="done-info" id="doneInfo">You focused for 0 minutes.</div>
  <button class="again" onclick="goAgain()">GO AGAIN</button>
</div>

<script>
  let total=0,remain=0,ticker=null,running=false,selMins=0;
  let audioCtx=null,wakeLock=null;

  document.getElementById('grid').addEventListener('click',e=>{
    const t=e.target.closest('.tile');
    if(!t)return;
    document.querySelectorAll('.tile').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    selMins=parseInt(t.dataset.mins);
    total=selMins*60; remain=total;
    document.getElementById('goBtn').classList.add('ready');
  });

  function startTimer(){
    if(!total)return;
    initAudio();
    tryFullscreen();
    doWakeLock();
    suppressAlerts();
    showSc('tmr');
    document.getElementById('doneOv').classList.remove('show');
    document.getElementById('pauseBtn').textContent='PAUSE';
    document.getElementById('pauseBtn').classList.remove('paused');
    renderTimer();
    running=true;
    ticker=setInterval(tick,1000);
  }

  function tick(){
    remain=Math.max(0,remain-1);
    renderTimer();
    if(remain===0){clearInterval(ticker);running=false;onEnd();}
  }

  function renderTimer(){
    const m=Math.floor(remain/60).toString().padStart(2,'0');
    const s=(remain%60).toString().padStart(2,'0');
    document.getElementById('bigTime').textContent=m+':'+s;
    const frac=total>0?remain/total:0;
    const pct=Math.round((1-frac)*100);
    document.getElementById('bar').style.width=(frac*100)+'%';
    document.getElementById('elLbl').textContent=pct+'% elapsed';
    const bt=document.getElementById('bigTime');
    const br=document.getElementById('bar');
    bt.className='big'; br.className='bar';
    if(frac<=0){bt.classList.add('end');br.classList.add('end');}
    else if(frac<=0.2){bt.classList.add('warn');br.classList.add('warn');}
  }

  function onEnd(){
    document.getElementById('doneOv').classList.add('show');
    playBeeps(); vibrate(); restoreAlerts();
    setTimeout(()=>{
      document.getElementById('doneInfo').textContent=
        'You focused for '+selMins+' minute'+(selMins!==1?'s':'')+'.';
      showSc('done'); tryExitFullscreen();
    },2200);
  }

  function togglePause(){
    if(remain===0)return;
    running=!running;
    const b=document.getElementById('pauseBtn');
    if(running){ticker=setInterval(tick,1000);b.textContent='PAUSE';b.classList.remove('paused');}
    else{clearInterval(ticker);b.textContent='RESUME';b.classList.add('paused');}
  }

  function addMin(){remain+=60;total=Math.max(total,remain);renderTimer();}

  function resetRun(){
    clearInterval(ticker);
    remain=total; running=true;
    document.getElementById('doneOv').classList.remove('show');
    document.getElementById('pauseBtn').textContent='PAUSE';
    document.getElementById('pauseBtn').classList.remove('paused');
    renderTimer();
    ticker=setInterval(tick,1000);
  }

  function exitToSel(){
    clearInterval(ticker);running=false;
    restoreAlerts();releaseWL();tryExitFullscreen();
    showSc('sel');
  }

  function goAgain(){
    document.querySelectorAll('.tile').forEach(x=>x.classList.remove('active'));
    document.getElementById('goBtn').classList.remove('ready');
    selMins=0;total=0;remain=0;
    showSc('sel');
  }

  function showSc(id){
    ['sel','tmr','done'].forEach(s=>
      document.getElementById(s).classList.toggle('hidden',s!==id));
  }

  /* Fullscreen */
  function tryFullscreen(){
    const e=document.documentElement;
    if(e.requestFullscreen)e.requestFullscreen().catch(()=>{});
    else if(e.webkitRequestFullscreen)e.webkitRequestFullscreen();
  }
  function tryExitFullscreen(){
    if(document.exitFullscreen)document.exitFullscreen().catch(()=>{});
    else if(document.webkitExitFullscreen)document.webkitExitFullscreen();
  }

  /* Alert suppression */
  let _alert=window.alert,_confirm=window.confirm,_prompt=window.prompt;
  function suppressAlerts(){window.alert=()=>{};window.confirm=()=>true;window.prompt=()=>null;}
  function restoreAlerts(){window.alert=_alert;window.confirm=_confirm;window.prompt=_prompt;}

  /* Wake lock */
  async function doWakeLock(){
    if('wakeLock' in navigator){
      try{wakeLock=await navigator.wakeLock.request('screen');}catch{}
    }
  }
  function releaseWL(){if(wakeLock){wakeLock.release().catch(()=>{});wakeLock=null;}}
  document.addEventListener('visibilitychange',()=>{
    if(document.visibilityState==='visible'&&running)doWakeLock();
  });

  /* Audio */
  function initAudio(){
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended')audioCtx.resume();
  }
  function beep(f,d,dl){
    if(!audioCtx)return;
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.type='sine';o.frequency.value=f;
    const t=audioCtx.currentTime+dl;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.5,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,t+d);
    o.start(t);o.stop(t+d+0.05);
  }
  function playBeeps(){
    initAudio();
    beep(523,0.15,0.0);beep(659,0.15,0.22);
    beep(784,0.15,0.44);beep(1046,0.7,0.66);
  }
  function vibrate(){if(navigator.vibrate)navigator.vibrate([180,90,180,90,500]);}

  /* Service Worker */
  if('serviceWorker' in navigator){
    const sw=`const C='focus-v3';
self.addEventListener('install',()=>self.skipWaiting());
self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));
self.addEventListener('fetch',e=>e.respondWith(caches.open(C).then(c=>c.match(e.request).then(r=>r||fetch(e.request)))));`;
    navigator.serviceWorker.register(
      URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))
    ).catch(()=>{});
  }
</script>
</body>
</html>
